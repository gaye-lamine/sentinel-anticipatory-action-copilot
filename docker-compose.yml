services:
  sentinel-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sentinel-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      SENTINEL_DATABASE_URL: sqlite:////data/sentinel.db
    ports:
      - "127.0.0.1:8084:8000"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
